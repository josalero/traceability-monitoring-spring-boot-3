apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: "15s"

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    jsonData:
      tracesToLogsV2:
        datasourceUid: 'loki'
        spanStartTimeShift: '1h'
        spanEndTimeShift: '1h'
        filterByTraceID: true
        # Apps emit JSON with "traceId":"..." — substring match avoids Loki labels on trace ids.
        customQuery: true
        query: '{service=~".+"} |= "$${__trace.traceId}"'

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    jsonData:
      derivedFields:
        - matcherRegex: '"service_name"\s*:\s*"([^"]+)"'
          name: ServiceName
        - datasourceUid: 'jaeger'
          matcherRegex: '"traceId"\s*:\s*"([a-fA-F0-9]+)"'
          name: TraceID
          url: '$${__value.raw}'
        - matcherRegex: '"orderId"\s*:\s*"([0-9a-fA-F]{8}-(?:[0-9a-fA-F]{4}-){3}[0-9a-fA-F]{12})"'
          name: OrderId
        - matcherRegex: '"spanId"\s*:\s*"([a-fA-F0-9]+)"'
          name: SpanId
