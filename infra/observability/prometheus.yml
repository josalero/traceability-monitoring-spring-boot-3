global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:9464"]

  # Container-internal ports only on commerce-net (all JVM apps listen on 8080).
  - job_name: spring-actuator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080
          - order-service:8080
          - inventory-service:8080
          - payment-service:8080
          - notification-service:8080
