version: "3.9"

networks:
  commerce-net: {}

volumes:
  pgdata: {}
  rabbitdata: {}
  redisdata: {}
  prometheus_data: {}
  grafana_data: {}
  loki_data: {}

# Wait for Eureka registration, not only Tomcat on 8080 (see config-repo application.yml readiness group).
x-healthcheck-jvm-8080: &healthcheck-jvm-8080
  test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health/readiness"]
  interval: 10s
  timeout: 3s
  retries: 15
  start_period: 90s

x-app-env: &otel-env
  JAVA_TOOL_OPTIONS: "-javaagent:/opt/otel/opentelemetry-javaagent.jar"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "none"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=commerce,deployment.environment=local"
  OTEL_TRACES_SAMPLER: "parentbased_always_on"
  # Helps propagate trace context through Spring Integration / Cloud Stream message handlers into Micrometer spans.
  # If error spans disappear from the trace you expect in Jaeger, try commenting this line out (fragmentation varies by agent version).
  OTEL_INSTRUMENTATION_SPRING_INTEGRATION_ENABLED: "true"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Stock postgres image does not read this; logical DBs are created by infra/postgres/init.sql on first init.
      POSTGRES_MULTIPLE_DATABASES: orders,inventory,payments
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs only when pgdata is empty (first boot). Creates databases orders / inventory / payments.
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [commerce-net]
    ports:
      # Host:container — use 5438 from your machine (e.g. psql, pgAdmin, IDE). Inside Docker network it's still 5432.
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.12-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitdata:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports: ["5672:5672", "15672:15672"]
    networks: [commerce-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 6

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    networks: [commerce-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 8

  # ---------- Observability stack (Path B) ----------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "9464:9464"     # Prometheus exporter
    networks: [commerce-net]

  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
    networks: [commerce-net]

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports: ["9090:9090"]
    networks: [commerce-net]

  loki:
    image: grafana/loki:2.9.5
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./infra/observability/loki-local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports: ["3100:3100"]
    networks: [commerce-net]

  promtail:
    image: grafana/promtail:3.1.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infra/observability/promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: ["-config.file=/etc/promtail/config.yaml"]
    depends_on: [loki]
    networks: [commerce-net]

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports: ["3000:3000"]
    depends_on: [prometheus, loki, jaeger]
    networks: [commerce-net]

  # ---------- Platform services ----------

  config-server:
    build: ./services/config-server
    ports: ["8888:8888"]
    volumes:
      - ./config-repo:/workspace/config-repo
    networks: [commerce-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/actuator/health"]
      interval: 10s
      retries: 12

  discovery-server:
    build: ./services/discovery-server
    ports: ["8761:8761"]
    depends_on:
      config-server: { condition: service_healthy }
    networks: [commerce-net]

  # ---------- Business services + gateway ----------

  api-gateway:
    build: ./services/api-gateway
    ports: ["8080:8080"]
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: "api-gateway"
    volumes:
      - ./infra/otel/agent:/opt/otel:ro
    depends_on:
      config-server:      { condition: service_healthy }
      discovery-server:   { condition: service_started }
      otel-collector:     { condition: service_started }
      order-service:      { condition: service_healthy }
      inventory-service: { condition: service_healthy }
      payment-service:    { condition: service_healthy }
    networks: [commerce-net]

  order-service:
    build: ./services/order-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: "order-service"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_USER: "${RABBITMQ_USER}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
    healthcheck:
      <<: *healthcheck-jvm-8080
    volumes:
      - ./infra/otel/agent:/opt/otel:ro
    depends_on:
      postgres:         { condition: service_healthy }
      rabbitmq:         { condition: service_healthy }
      redis:            { condition: service_healthy }
      config-server:    { condition: service_healthy }
      discovery-server: { condition: service_started }
      otel-collector:   { condition: service_started }
    networks: [commerce-net]

  inventory-service:
    build: ./services/inventory-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: "inventory-service"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_USER: "${RABBITMQ_USER}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
    healthcheck:
      <<: *healthcheck-jvm-8080
    volumes:
      - ./infra/otel/agent:/opt/otel:ro
    depends_on:
      postgres:         { condition: service_healthy }
      rabbitmq:         { condition: service_healthy }
      config-server:    { condition: service_healthy }
      discovery-server: { condition: service_started }
      otel-collector:   { condition: service_started }
    networks: [commerce-net]

  payment-service:
    build: ./services/payment-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: "payment-service"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_USER: "${RABBITMQ_USER}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
    healthcheck:
      <<: *healthcheck-jvm-8080
    volumes:
      - ./infra/otel/agent:/opt/otel:ro
    depends_on:
      postgres:         { condition: service_healthy }
      rabbitmq:         { condition: service_healthy }
      config-server:    { condition: service_healthy }
      discovery-server: { condition: service_started }
      otel-collector:   { condition: service_started }
    networks: [commerce-net]

  notification-service:
    build: ./services/notification-service
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: "notification-service"
      RABBITMQ_USER:     "${RABBITMQ_USER}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
    volumes:
      - ./infra/otel/agent:/opt/otel:ro
    depends_on:
      rabbitmq:         { condition: service_healthy }
      config-server:    { condition: service_healthy }
      discovery-server: { condition: service_started }
      otel-collector:   { condition: service_started }
    networks: [commerce-net]

  web-ui:
    build: ./web-ui
    ports: ["5173:80"]
    depends_on:
      api-gateway: { condition: service_started }
    networks: [commerce-net]
