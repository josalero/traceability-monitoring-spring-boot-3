# Merged with docker-compose.yml via docker-compose.dynatrace-poc.yml (include path list).
# Micrometer metrics + OpenTelemetry Java agent → Dynatrace OTLP (HTTP/protobuf) for traces.
# Run ./infra/otel/install-agent.sh so ./infra/otel/agent holds opentelemetry-javaagent.jar.
# Metrics: DYNATRACE_API_TOKEN; traces: DT_OTLP_* (see docs/DYNATRACE-POC.md).
# Local OSS stack (Jaeger, …) uses profile `commerce-local-observability` — add the profile to include it.
#
# Requires Docker Compose v2.24+ (!override / !reset).

x-dynatrace-poc-app-env: &dynatrace-poc-app-env
  SPRING_PROFILES_ACTIVE: "cloud,dynatrace"
  DT_ENVIRONMENT_ID: ${DT_ENVIRONMENT_ID}
  DYNATRACE_API_TOKEN: ${DYNATRACE_API_TOKEN}

# OTLP traces to Dynatrace (Option A). Metrics: OTEL_METRICS_EXPORTER=none — use Micrometer only.
x-otlp-dynatrace-env: &otlp-dynatrace-env
  JAVA_TOOL_OPTIONS: "-javaagent:/opt/otel/opentelemetry-javaagent.jar"
  OTEL_EXPORTER_OTLP_ENDPOINT: "${DT_OTLP_ENDPOINT}"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_EXPORTER_OTLP_HEADERS: "Authorization=Api-Token ${DT_OTLP_TRACE_TOKEN}"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
  OTEL_TRACES_SAMPLER: "parentbased_always_on"
  OTEL_INSTRUMENTATION_SPRING_INTEGRATION_ENABLED: "true"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=commerce,deployment.environment=dynatrace-poc"

services:
  # --- Local OSS stack off for Dynatrace POC (enable with --profile commerce-local-observability) ---
  otel-collector:
    profiles: ["commerce-local-observability"]
  jaeger:
    profiles: ["commerce-local-observability"]
  prometheus:
    profiles: ["commerce-local-observability"]
  loki:
    profiles: ["commerce-local-observability"]
  promtail:
    profiles: ["commerce-local-observability"]
  grafana:
    profiles: ["commerce-local-observability"]

  api-gateway:
    environment: !override
      <<: [*dynatrace-poc-app-env, *otlp-dynatrace-env]
      OTEL_SERVICE_NAME: "api-gateway"
    volumes:
      - ./infra/otel/agent:/opt/otel:ro
    healthcheck:
      test:
        ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 90s
    depends_on: !override
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_started }
      order-service: { condition: service_healthy }
      inventory-service: { condition: service_healthy }
      payment-service: { condition: service_healthy }

  order-service:
    environment: !override
      <<: [*dynatrace-poc-app-env, *otlp-dynatrace-env]
      OTEL_SERVICE_NAME: "order-service"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    volumes:
      - ./infra/otel/agent:/opt/otel:ro
    depends_on: !override
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_started }

  inventory-service:
    environment: !override
      <<: [*dynatrace-poc-app-env, *otlp-dynatrace-env]
      OTEL_SERVICE_NAME: "inventory-service"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    volumes:
      - ./infra/otel/agent:/opt/otel:ro
    depends_on: !override
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_started }

  payment-service:
    environment: !override
      <<: [*dynatrace-poc-app-env, *otlp-dynatrace-env]
      OTEL_SERVICE_NAME: "payment-service"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    volumes:
      - ./infra/otel/agent:/opt/otel:ro
    depends_on: !override
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_started }

  notification-service:
    environment: !override
      <<: [*dynatrace-poc-app-env, *otlp-dynatrace-env]
      OTEL_SERVICE_NAME: "notification-service"
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    volumes:
      - ./infra/otel/agent:/opt/otel:ro
    depends_on: !override
      rabbitmq: { condition: service_healthy }
      config-server: { condition: service_healthy }
      discovery-server: { condition: service_started }

  # SPA on :5173 — do not wait for api-gateway (page can load while backends boot).
  web-ui:
    depends_on: !reset []
