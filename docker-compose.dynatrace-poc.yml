# Dynatrace POC — single entrypoint for the stack + OneAgent overrides.
# Merges docker-compose.yml with docker-compose.dynatrace-poc.overrides.yml (see Docker
# Compose "include" with a path list). Jaeger / Grafana / Prometheus / Loki / Promtail /
# otel-collector are **not** started (profile `commerce-local-observability`); use Dynatrace
# for traces and metrics. Run:
#
#   docker compose -f docker-compose.dynatrace-poc.yml up -d --build
#
# Prerequisites and validation: docs/DYNATRACE-POC.md

include:
  - path:
      - docker-compose.yml
      - docker-compose.dynatrace-poc.overrides.yml
